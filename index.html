<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greedy Shopkeepers</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ══════════════════════════════════════════════
       THEME VARIABLES
    ══════════════════════════════════════════════ */

    /* DUNGEON — wave / combat phase */
    :root {
      --bg:           #07090f;
      --surface:      #0f1438;
      --surface-alt:  #0a0e28;
      --surface-deep: #05060c;
      --border:       #253466;
      --border-hi:    #4a6898;
      --text:         #bcc4a8;
      --text-muted:   #3e5068;
      --text-strong:  #dcd8b8;
      --accent:       #e87820;
      --gold:         #c8a818;
      --ok:           #48a040;
      --warn:         #c03030;
      --empty-bd:     #1a2450;
      --empty-tx:     #253466;
    }

    /* STASH — loot / treasure phase */
    body[data-theme="stash"] {
      --bg:           #0e0800;
      --surface:      #2a1a06;
      --surface-alt:  #1e1004;
      --surface-deep: #0c0800;
      --border:       #5e3818;
      --border-hi:    #9a6428;
      --text:         #e0c888;
      --text-muted:   #7a5828;
      --text-strong:  #f0dca8;
      --accent:       #d09828;
      --gold:         #e0aa28;
      --ok:           #58a838;
      --warn:         #d04028;
      --empty-bd:     #3a2210;
      --empty-tx:     #5a3820;
    }

    /* SHOP — scoring / gameover phase */
    body[data-theme="shop"] {
      --bg:           #0c0800;
      --surface:      #241a04;
      --surface-alt:  #1a1206;
      --surface-deep: #0a0800;
      --border:       #806020;
      --border-hi:    #c09030;
      --text:         #f0e0a8;
      --text-muted:   #907848;
      --text-strong:  #fff8d0;
      --accent:       #f0c020;
      --gold:         #f0c020;
      --ok:           #68c048;
      --warn:         #e84828;
      --empty-bd:     #504010;
      --empty-tx:     #706020;
    }

    /* ══════════════════════════════════════════════
       BASE LAYOUT
    ══════════════════════════════════════════════ */
    body {
      background-color: var(--bg);
      /* Subtle scanline */
      background-image: repeating-linear-gradient(
        180deg,
        transparent 0, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      color: var(--text);
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      line-height: 1.9;
      min-height: 100vh;
      transition: background-color 0.35s;
    }

    #app { max-width: 1100px; margin: 0 auto; padding: 16px 16px 40px; }

    /* ══════════════════════════════════════════════
       TYPOGRAPHY
    ══════════════════════════════════════════════ */
    .game-title {
      text-align: center;
      font-size: 18px;
      color: var(--accent);
      text-shadow: 3px 3px 0 #000;
      letter-spacing: 3px;
      padding: 12px 0 20px;
    }
    h2 {
      font-size: 10px;
      color: var(--text-strong);
      margin-bottom: 10px;
      letter-spacing: 1px;
    }
    h3 {
      font-size: 8px;
      color: var(--text-muted);
      font-weight: normal;
      margin-bottom: 6px;
    }

    /* ══════════════════════════════════════════════
       PANEL / WINDOW CHROME (SNES style)
    ══════════════════════════════════════════════ */
    .win {
      background: var(--surface);
      border: 3px solid var(--border);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.85);
      padding: 16px;
      margin-bottom: 16px;
      position: relative;
    }
    .win-alt {
      background: var(--surface-alt);
      border: 2px solid var(--border);
      box-shadow: 3px 3px 0 rgba(0,0,0,0.8);
      padding: 12px 16px;
      margin-bottom: 16px;
    }
    .win-deep {
      background: var(--surface-deep);
      border: 2px solid var(--border);
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    /* Bright top/left edge to suggest a lit panel face */
    .win::before {
      content: '';
      display: block;
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-top: 1px solid rgba(255,255,255,0.06);
      border-left: 1px solid rgba(255,255,255,0.04);
    }

    /* ══════════════════════════════════════════════
       STATUS BAR
    ══════════════════════════════════════════════ */
    .status-bar {
      background: var(--surface-deep);
      border: 3px solid var(--border-hi);
      box-shadow: 4px 4px 0 rgba(0,0,0,0.85);
      padding: 10px 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      align-items: center;
      font-size: 8px;
    }
    .status-bar .sb-label { color: var(--text-muted); }
    .status-bar .sb-val   { color: var(--text-strong); }
    .status-bar .sb-wave  { color: var(--accent); font-size: 9px; }
    .status-bar .sb-gold  { color: var(--gold); }

    /* ══════════════════════════════════════════════
       BUTTONS
    ══════════════════════════════════════════════ */
    button {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      border: 2px solid;
      padding: 9px 14px;
      box-shadow: 3px 3px 0 #000;
      transition: transform 0.05s, box-shadow 0.05s;
      line-height: 1.5;
    }
    button:not(:disabled):hover  { transform: translate(1px, 1px); box-shadow: 2px 2px 0 #000; }
    button:not(:disabled):active { transform: translate(3px, 3px); box-shadow: none; }
    button:disabled { opacity: 0.3; cursor: not-allowed; box-shadow: 2px 2px 0 #000; }

    .btn-primary   { background: #16327a; border-color: #4878e0; color: #a8c8ff; }
    .btn-success   { background: #164a18; border-color: #48a840; color: #88e868; }
    .btn-warning   { background: #5a2e00; border-color: #c07018; color: #ffb838; }
    .btn-danger    { background: #580e0e; border-color: #b83030; color: #ff8888; }
    .btn-secondary { background: #242434; border-color: #585878; color: #b8b8d0; }
    .btn-ghost     { background: transparent; border-color: var(--border); color: var(--text-muted); box-shadow: none; }
    .btn-ghost:not(:disabled):hover { border-color: var(--border-hi); color: var(--text); box-shadow: none; transform: none; }

    .btn-row  { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 12px; }
    .card-row { display: flex; flex-wrap: wrap; gap: 8px; min-height: 44px; align-items: flex-start; }

    /* ══════════════════════════════════════════════
       CARDS
    ══════════════════════════════════════════════ */
    .card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      width: 76px;
      height: 108px;
      padding: 6px 5px 5px;
      border: 3px solid;
      box-shadow: 3px 3px 0 #000;
      cursor: pointer;
      flex-shrink: 0;
      font-family: 'Press Start 2P', monospace;
      transition: transform 0.07s, box-shadow 0.07s;
      position: relative;
    }
    .card:hover:not(.assigned):not(.no-hover) {
      transform: translate(-2px, -5px);
      box-shadow: 5px 8px 0 #000;
    }
    .card.selected {
      outline: 2px solid #fff;
      outline-offset: 2px;
      transform: translate(-2px, -6px);
      box-shadow: 5px 9px 0 #000;
    }
    .card.assigned { opacity: 0.28; pointer-events: none; transform: none !important; box-shadow: 2px 2px 0 #000 !important; }

    .card-level { font-size: 17px; line-height: 1; align-self: flex-start; }
    .card-emoji { font-size: 26px; flex-shrink: 0; }
    .card-type  { font-size: 6px; text-align: center; line-height: 1.5; }

    /* Rarity colors — vivid & saturated for pixel art feel */
    .rarity-common   { background: #0a1e08; border-color: #3e9828; color: #88cc68; }
    .rarity-uncommon { background: #070e26; border-color: #2868c8; color: #68a4f8; }
    .rarity-rare     { background: #140620; border-color: #8828c0; color: #c870f0; }
    .rarity-epic     { background: #1e0800; border-color: #d85808; color: #f0a030; }

    /* Monster card face gets a slight overlay tint to distinguish */
    .card.monster-face { filter: saturate(0.85) brightness(0.95); }

    /* ══════════════════════════════════════════════
       CARD STACK — depth indicator
    ══════════════════════════════════════════════ */
    .pile-stack {
      position: relative;
      width: 76px;
      height: 108px;
      flex-shrink: 0;
    }
    .pile-stack .card {
      position: relative;
      z-index: 3;
    }
    /* One card peeking behind */
    .pile-stack.depth-2::after,
    .pile-stack.depth-many::after {
      content: '';
      position: absolute;
      top: 5px; left: 5px;
      width: 76px; height: 108px;
      background: #0a0e28;
      border: 3px solid #2a3460;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.9);
      z-index: 2;
    }
    /* Second card peeking even further behind */
    .pile-stack.depth-many::before {
      content: '';
      position: absolute;
      top: 10px; left: 10px;
      width: 76px; height: 108px;
      background: #06091e;
      border: 3px solid #1c2448;
      box-shadow: 3px 3px 0 rgba(0,0,0,0.9);
      z-index: 1;
    }

    /* ══════════════════════════════════════════════
       WAVE ARENA — 4-column grid
    ══════════════════════════════════════════════ */
    .wave-arena {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
    }
    @media (max-width: 600px) { .wave-arena { grid-template-columns: repeat(4, 1fr); gap: 6px; } }

    .pile {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .pile-empty {
      width: 76px; height: 108px;
      border: 2px dashed var(--empty-bd);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--empty-tx);
      font-size: 18px;
    }
    .pile-count { font-size: 7px; color: var(--text-muted); position: relative; z-index: 10; margin-top: 12px; }
    .pile-btn   { font-size: 7px; padding: 5px 8px; }

    /* ══════════════════════════════════════════════
       COMBAT STATUS
    ══════════════════════════════════════════════ */
    .combat-status {
      margin-top: 12px;
      font-size: 8px;
      padding: 10px 14px;
      border: 2px solid;
      line-height: 1.8;
    }
    .combat-ok   { border-color: var(--ok);   color: var(--ok);   background: rgba(72,160,64,0.1); }
    .combat-warn { border-color: var(--warn); color: var(--warn); background: rgba(192,48,48,0.1); }

    /* ══════════════════════════════════════════════
       SORT BUTTONS
    ══════════════════════════════════════════════ */
    .sort-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 10px;
      font-size: 7px;
    }
    .sort-row .sort-label { color: var(--text-muted); }
    .sort-btn { font-size: 7px; padding: 5px 10px; box-shadow: 2px 2px 0 #000; }
    .sort-btn.active { background: #303048; border-color: var(--border-hi); color: var(--text-strong); }

    /* ══════════════════════════════════════════════
       SETUP SCREEN
    ══════════════════════════════════════════════ */
    .setup-screen { text-align: center; padding: 40px 20px 60px; }

    /* Pixel art "market" banner using CSS */
    .setup-banner {
      margin: 0 auto 32px;
      max-width: 500px;
      height: 120px;
      position: relative;
      overflow: hidden;
      border: 3px solid var(--border);
      box-shadow: 4px 4px 0 #000;
      background:
        linear-gradient(180deg, #0a1a3a 0%, #0a1a3a 55%, #1a3010 55%, #1a3010 100%);
    }
    /* Buildings silhouette */
    .setup-banner::before {
      content: '';
      position: absolute;
      bottom: 30px; left: 0; right: 0;
      height: 70px;
      background:
        linear-gradient(90deg,
          transparent 0, transparent 20px,
          #0e2440 20px, #0e2440 80px,
          transparent 80px, transparent 100px,
          #0c1e38 100px, #0c1e38 170px,
          transparent 170px, transparent 190px,
          #0e2440 190px, #0e2440 240px,
          transparent 240px, transparent 260px,
          #0c1e38 260px, #0c1e38 330px,
          transparent 330px, transparent 360px,
          #0e2440 360px, #0e2440 430px,
          transparent 430px
        );
    }
    /* Ground */
    .setup-banner::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 30px;
      background: #2a1808;
      border-top: 3px solid #5a3818;
    }

    .setup-banner-text {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      z-index: 2;
    }
    .banner-title {
      font-size: 16px;
      color: #f0c828;
      text-shadow: 2px 2px 0 #000;
      letter-spacing: 2px;
    }
    .banner-sub {
      font-size: 7px;
      color: #a09870;
    }

    .setup-prompt { color: var(--text-muted); font-size: 8px; margin-bottom: 12px; }
    .player-count-row { display: flex; justify-content: center; gap: 14px; margin: 16px 0 24px; }
    .player-count-btn { width: 68px; height: 68px; font-size: 22px; padding: 0; }

    /* ══════════════════════════════════════════════
       INTERSTITIAL
    ══════════════════════════════════════════════ */
    .interstitial {
      text-align: center;
      padding: 80px 20px;
    }
    .interstitial .inter-phase {
      font-size: 8px;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .interstitial h2 { font-size: 16px; margin-bottom: 10px; color: var(--text-strong); }
    .interstitial .inter-sub { color: var(--text-muted); margin-bottom: 40px; font-size: 8px; }

    /* ══════════════════════════════════════════════
       STASH HINT
    ══════════════════════════════════════════════ */
    .stash-hint {
      background: var(--surface-alt);
      border: 2px solid var(--border);
      padding: 12px 14px;
      margin-bottom: 14px;
      font-size: 7px;
      line-height: 2.2;
      color: var(--text-muted);
    }
    .stash-hint strong { color: var(--text-strong); }

    /* ══════════════════════════════════════════════
       SCORING
    ══════════════════════════════════════════════ */
    .set-bucket {
      background: var(--surface-deep);
      border: 2px dashed var(--border);
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .set-bucket.valid { border-color: var(--ok); border-style: solid; }
    .set-bucket h4 { font-size: 7px; color: var(--text-muted); margin-bottom: 8px; }

    .set-type-btn {
      text-align: left;
      padding: 10px 14px;
      font-size: 7px;
      font-weight: normal;
      line-height: 2;
    }
    .set-type-btn .set-name { font-size: 8px; display: block; margin-bottom: 3px; }
    .set-type-btn .set-desc { color: var(--text-muted); font-size: 7px; }
    .set-type-btn:not(:disabled) {
      border-color: var(--ok) !important;
      background: rgba(72,168,64,0.14) !important;
      color: #88e868 !important;
    }

    .score-ref {
      font-size: 7px;
      color: var(--text-muted);
      line-height: 2.2;
    }
    .score-ref strong { color: var(--text); }

    /* ══════════════════════════════════════════════
       SCOREBOARD
    ══════════════════════════════════════════════ */
    .score-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 10px;
      border-bottom: 2px solid var(--border);
      font-size: 10px;
    }
    .score-entry.winner { color: var(--gold); font-size: 12px; }
    .score-breakdown { font-size: 7px; color: var(--text-muted); text-align: right; margin-top: 3px; }
    .score-total { font-size: 28px; color: var(--gold); text-shadow: 2px 2px 0 #000; }

    .score-summary {
      font-size: 9px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: baseline;
      line-height: 2;
    }
    .score-summary .big { font-size: 22px; color: var(--gold); text-shadow: 2px 2px 0 #000; }
    .score-summary .dim { color: var(--text-muted); }

    /* ══════════════════════════════════════════════
       TAGS
    ══════════════════════════════════════════════ */
    .tag { display: inline-block; padding: 2px 7px; font-size: 7px; border: 1px solid; }
    .tag-common   { background: #0a1e08; border-color: #3e9828; color: #88cc68; }
    .tag-uncommon { background: #070e26; border-color: #2868c8; color: #68a4f8; }
    .tag-rare     { background: #140620; border-color: #8828c0; color: #c870f0; }
    .tag-epic     { background: #1e0800; border-color: #d85808; color: #f0a030; }

    /* ══════════════════════════════════════════════
       PLAYERS OVERVIEW
    ══════════════════════════════════════════════ */
    .players-overview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
    .player-pill {
      background: var(--surface-deep);
      border: 2px solid var(--border);
      box-shadow: 2px 2px 0 #000;
      padding: 8px 12px;
      min-width: 100px;
    }
    .player-pill.active { border-color: var(--gold); }
    .player-pill .pill-name  { font-size: 9px; margin-bottom: 4px; color: var(--text-strong); }
    .player-pill .pill-stats { font-size: 7px; color: var(--text-muted); line-height: 1.8; }

    /* ══════════════════════════════════════════════
       MISC HELPERS
    ══════════════════════════════════════════════ */
    .dim   { color: var(--text-muted); }
    .gold  { color: var(--gold); }
    .ok    { color: var(--ok); }
    .warn  { color: var(--warn); }
    .strong { color: var(--text-strong); }

    em { font-style: normal; color: var(--text-muted); font-size: 8px; }

    .rule { border: none; border-top: 2px solid var(--border); margin: 12px 0; }
  </style>
</head>
<body data-theme="dungeon">
<div id="app"></div>
<script>
'use strict';

// ============================================================
// CONFIG — all tunable values live here
// ============================================================
const CONFIG = {
  WAVE_COUNT: 5,
  HAND_SIZE: 10,
  HAND_MAX_START: 15,
  STASH_QUALITY_MAX: 5,    // quality stash: up to this many cards of any level
  STASH_QUANTITY_MAX: 10,  // quantity stash: combined level total must not exceed this
  SCORING: {
    // Lookup tables indexed by set size (index 0 and 1 are unused/invalid)
    MATCHING_SET_POINTS:  [0, 0, 3, 7, 14, 25, 42, 65, 95, 133, 180],  // matching rarity / level / type
    STRAIGHT_POINTS:      [0, 0, 0, 10, 20, 34, 52, 74, 100, 130, 164],  // level straight (min 3)
    RARITY_RAINBOW:       15,   // exactly 4 cards, one of each rarity
    ITEM_TYPE_RAINBOW:    20,   // exactly 5 cards, one of each item type
  },
  WAVE_PILES: 8,
  WAVE_BASE_MONSTERS_PER_PLAYER: 6,    // monsters per player in wave 1
  WAVE_SCALING_MONSTERS_PER_PLAYER: 1, // extra monsters per player per wave after wave 1
};

// ============================================================
// CARD DATA
// ============================================================
const MONSTER_EMOJI = {
  goblin: '👺', undead: '💀', beast: '🐺', elemental: '🌪️', duck: '🦆',
};
const ITEM_EMOJI = {
  weapon: '⚔️', armor: '🛡️', consumable: '🧪', trinket: '💍', luxury: '💎',
};
const RARITY_LABEL = {
  common: 'Common', uncommon: 'Uncommon', rare: 'Rare', epic: 'Epic',
};

const RARITY_ORDER = { common: 0, uncommon: 1, rare: 2, epic: 3 };

// CARDS map: id -> card object (populated by buildDeck)
let CARDS = {};

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function buildDeck() {
  // Distributions from design doc
  const rarities = [
    ...Array(50).fill('common'),
    ...Array(40).fill('uncommon'),
    ...Array(30).fill('rare'),
    ...Array(20).fill('epic'),
  ];
  const levels = [
    ...Array(14).fill(1),  ...Array(16).fill(2),  ...Array(14).fill(3),
    ...Array(16).fill(4),  ...Array(14).fill(5),  ...Array(16).fill(6),
    ...Array(14).fill(7),  ...Array(16).fill(8),  ...Array(10).fill(9),
    ...Array(10).fill(10),
  ];
  const monsterTypes = [
    ...Array(30).fill('goblin'),    ...Array(30).fill('undead'),
    ...Array(30).fill('beast'),     ...Array(30).fill('elemental'),
    ...Array(20).fill('duck'),
  ];
  const itemTypes = [
    ...Array(30).fill('weapon'),    ...Array(30).fill('armor'),
    ...Array(30).fill('consumable'),...Array(30).fill('trinket'),
    ...Array(20).fill('luxury'),
  ];

  // Shuffle each pool independently, then zip into cards
  shuffle(rarities); shuffle(levels); shuffle(monsterTypes); shuffle(itemTypes);

  const cards = {};
  for (let i = 0; i < 140; i++) {
    const id = 'c' + String(i + 1).padStart(3, '0');
    cards[id] = {
      id,
      rarity:      rarities[i],
      level:       levels[i],
      monsterType: monsterTypes[i],
      itemType:    itemTypes[i],
    };
  }
  return cards;
}

// ============================================================
// GAME STATE
// ============================================================
let G = null;

function initGame(playerCount) {
  CARDS = buildDeck();

  // drawPile: index 0 = bottom (loot bonus), last index = top (deal/forfeit)
  const drawPile = shuffle(Object.keys(CARDS));

  const players = [];
  for (let i = 0; i < playerCount; i++) {
    players.push({ id: i, name: 'Player ' + (i + 1), hand: [], lootPile: [], stash: [] });
  }

  // Deal 10 cards to each player (from top of deck, round-robin)
  for (let round = 0; round < CONFIG.HAND_SIZE; round++) {
    for (const p of players) {
      if (drawPile.length > 0) p.hand.push(drawPile.pop());
    }
  }

  G = {
    phase: 'wave',
    waveIndex: 0,
    currentPlayerIndex: Math.floor(Math.random() * playerCount),
    players,
    drawPile,
    wavePiles: [],          // array of card-id arrays; last element = top (visible)
    selectedCardIds: [],    // cards in hand selected for combat

    // Stash phase
    stashPlayerIndex: 0,
    stashSelectedIds: [],

    // Scoring phase
    scoringPlayerIndex: 0,
    scoringSets:    [],     // { type, cardIds, points }
    scoringSelected: [],
    scoringAssigned: {},    // cardId -> true
    allPlayerSets:  {},     // playerIndex -> array of sets

    // Interstitial
    interstitialNext: null,

    // Sorting
    cardSort: [],   // active sort keys in priority order, e.g. ['rarity', 'level']
  };

  setupWave(0);
  render();
}

function setupWave(waveIndex) {
  const numPiles = CONFIG.WAVE_PILES;
  const total    = CONFIG.WAVE_BASE_MONSTERS_PER_PLAYER * G.players.length
                 + CONFIG.WAVE_SCALING_MONSTERS_PER_PLAYER * G.players.length * waveIndex;
  const base   = Math.floor(total / numPiles);
  const extras = total % numPiles;

  G.wavePiles = [];
  G.selectedCardIds = [];
  for (let p = 0; p < numPiles; p++) {
    const pileSize = base + (p < extras ? 1 : 0);
    const pile = [];
    for (let m = 0; m < pileSize; m++) {
      if (G.drawPile.length > 0) pile.push(G.drawPile.pop());
    }
    G.wavePiles.push(pile);
  }
}

// ============================================================
// COMBAT LOGIC
// ============================================================
function canDefeat(cardIds, monsterCardId) {
  if (cardIds.length === 0) return false;
  const monster = CARDS[monsterCardId];
  const items   = cardIds.map(id => CARDS[id]);
  if (!items.every(c => c.rarity === items[0].rarity)) return false; // must be same rarity
  return items.reduce((s, c) => s + c.level, 0) >= monster.level;
}

function defeatMonster(pileIndex) {
  const pile   = G.wavePiles[pileIndex];
  const player = G.players[G.currentPlayerIndex];
  const played = G.selectedCardIds;

  pile.pop(); // remove top monster

  // Played cards go to loot pile (not discarded)
  for (const id of played) {
    const i = player.hand.indexOf(id);
    if (i !== -1) player.hand.splice(i, 1);
    player.lootPile.push(id);
  }

  // Loot bonus: 1 card from bottom of draw pile
  if (G.drawPile.length > 0) {
    player.lootPile.push(G.drawPile.shift());
  }

  G.selectedCardIds = [];

  if (G.wavePiles.every(p => p.length === 0)) {
    startStashPhase();
  } else {
    advanceTurn();
  }
}

function forfeit() {
  const player = G.players[G.currentPlayerIndex];
  if (G.drawPile.length > 0) player.hand.push(G.drawPile.pop());
  G.selectedCardIds = [];
  advanceTurn();
}

function enterWavePhase() {
  const player = G.players[G.currentPlayerIndex];
  G.phase = player.hand.length > CONFIG.HAND_MAX_START ? 'discard' : 'wave';
}

function handleDiscardCard(cardId) {
  if (!G || G.phase !== 'discard') return;
  const player = G.players[G.currentPlayerIndex];
  const i = player.hand.indexOf(cardId);
  if (i !== -1) player.hand.splice(i, 1);
  if (player.hand.length <= CONFIG.HAND_MAX_START) G.phase = 'wave';
  render();
}

function advanceTurn() {
  if (G.players.length === 1) return; // solo: same player continues
  G.interstitialNext = 'wave-turn';
  G.phase = 'interstitial';
}

// ============================================================
// STASH PHASE
// ============================================================
function startStashPhase() {
  G.phase = 'stash';
  G.stashPlayerIndex = 0;
  G.stashSelectedIds = [];
}

function confirmStash(type) {
  const player   = G.players[G.stashPlayerIndex];
  const selected = G.stashSelectedIds;

  // Validate
  if (type === 'quality') {
    if (selected.length < 1 || selected.length > CONFIG.STASH_QUALITY_MAX) return;
  } else {
    if (selected.length === 0) return;
    if (selected.reduce((s, id) => s + CARDS[id].level, 0) > CONFIG.STASH_QUANTITY_MAX) return;
  }

  // Move selected to stash
  for (const id of selected) {
    const i = player.lootPile.indexOf(id);
    if (i !== -1) player.lootPile.splice(i, 1);
    player.stash.push(id);
  }

  // Remaining loot returns to hand
  player.hand.push(...player.lootPile);
  player.lootPile = [];

  // Refill hand to HAND_SIZE
  while (player.hand.length < CONFIG.HAND_SIZE && G.drawPile.length > 0) {
    player.hand.push(G.drawPile.pop());
  }

  G.stashSelectedIds = [];

  const hasMorePlayers = G.stashPlayerIndex < G.players.length - 1;
  if (hasMorePlayers) {
    G.stashPlayerIndex++;
    G.interstitialNext = 'stash-next';
    G.phase = 'interstitial';
  } else {
    // All players done stashing
    if (G.waveIndex < CONFIG.WAVE_COUNT - 1) {
      G.waveIndex++;
      setupWave(G.waveIndex);
      enterWavePhase();
    } else {
      startScoring();
    }
  }
}

// ============================================================
// SCORING PHASE
// ============================================================
const SET_TYPES = [
  { key: 'matching_rarity', label: 'Matching Rarity',    desc: 'Min 2 cards, same rarity' },
  { key: 'matching_level',  label: 'Matching Level',     desc: 'Min 2 cards, same level' },
  { key: 'matching_type',   label: 'Matching Item Type', desc: 'Min 2 cards, same item type' },
  { key: 'rarity_rainbow',  label: 'Rarity Rainbow',     desc: 'Exactly 4 — one of each rarity' },
  { key: 'item_type_rainbow',label:'Type Rainbow',       desc: 'Exactly 5 — one of each item type' },
  { key: 'level_straight',  label: 'Level Straight',     desc: 'Min 3 cards, consecutive levels' },
];

function validateSet(type, cardIds) {
  if (!cardIds.length) return false;
  const cards = cardIds.map(id => CARDS[id]);
  switch (type) {
    case 'matching_rarity':
      return cards.length >= 2 && cards.every(c => c.rarity === cards[0].rarity);
    case 'matching_level':
      return cards.length >= 2 && cards.every(c => c.level === cards[0].level);
    case 'matching_type':
      return cards.length >= 2 && cards.every(c => c.itemType === cards[0].itemType);
    case 'rarity_rainbow': {
      if (cards.length !== 4) return false;
      return new Set(cards.map(c => c.rarity)).size === 4;
    }
    case 'item_type_rainbow': {
      if (cards.length !== 5) return false;
      return new Set(cards.map(c => c.itemType)).size === 5;
    }
    case 'level_straight': {
      if (cards.length < 3) return false;
      const lvls = [...new Set(cards.map(c => c.level))].sort((a, b) => a - b);
      if (lvls.length !== cards.length) return false; // duplicate levels
      for (let i = 1; i < lvls.length; i++) {
        if (lvls[i] !== lvls[i - 1] + 1) return false;
      }
      return true;
    }
    default: return false;
  }
}

function scoreSet(type, cardIds) {
  const n = cardIds.length;
  const S = CONFIG.SCORING;
  const lookup = (table) => table[Math.min(n, table.length - 1)] || 0;
  switch (type) {
    case 'matching_rarity':
    case 'matching_level':
    case 'matching_type':     return lookup(S.MATCHING_SET_POINTS);
    case 'rarity_rainbow':    return S.RARITY_RAINBOW;
    case 'item_type_rainbow': return S.ITEM_TYPE_RAINBOW;
    case 'level_straight':    return lookup(S.STRAIGHT_POINTS);
    default: return 0;
  }
}

function startScoring() {
  G.phase = 'scoring';
  G.scoringPlayerIndex = 0;
  G.scoringSets    = [];
  G.scoringSelected = [];
  G.scoringAssigned = {};
}

function assignSet(type) {
  const eligible = G.scoringSelected.filter(id => !G.scoringAssigned[id]);
  if (!validateSet(type, eligible)) return;
  const pts = scoreSet(type, eligible);
  G.scoringSets.push({ type, cardIds: [...eligible], points: pts });
  for (const id of eligible) G.scoringAssigned[id] = true;
  G.scoringSelected = [];
}

function removeSet(index) {
  const set = G.scoringSets[index];
  for (const id of set.cardIds) delete G.scoringAssigned[id];
  G.scoringSets.splice(index, 1);
}

function lockInScore() {
  G.allPlayerSets[G.scoringPlayerIndex] = [...G.scoringSets];

  if (G.scoringPlayerIndex < G.players.length - 1) {
    G.scoringPlayerIndex++;
    G.scoringSets    = [];
    G.scoringSelected = [];
    G.scoringAssigned = {};
    G.interstitialNext = 'scoring-next';
    G.phase = 'interstitial';
  } else {
    G.phase = 'gameover';
  }
}

function calcBestScore(playerIndex) {
  const stash = G.players[playerIndex].stash;
  const base  = stash.reduce((s, id) => s + CARDS[id].level, 0);
  if (stash.length === 0) return { base, bonus: 0, total: base };

  // Build group maps
  const byRarity = {}, byLevel = {}, byType = {};
  for (const id of stash) {
    const c = CARDS[id];
    (byRarity[c.rarity]   = byRarity[c.rarity]   || []).push(id);
    (byLevel[c.level]     = byLevel[c.level]      || []).push(id);
    (byType[c.itemType]   = byType[c.itemType]    || []).push(id);
  }

  const candidates = [];

  // Matching sets
  for (const ids of Object.values(byRarity)) if (ids.length >= 2) candidates.push({ type: 'matching_rarity', cardIds: ids });
  for (const ids of Object.values(byLevel))  if (ids.length >= 2) candidates.push({ type: 'matching_level',  cardIds: ids });
  for (const ids of Object.values(byType))   if (ids.length >= 2) candidates.push({ type: 'matching_type',   cardIds: ids });

  // Level straights — all maximal consecutive runs ≥3, plus sub-runs
  const levels = Object.keys(byLevel).map(Number).sort((a, b) => a - b);
  let runStart = 0;
  for (let i = 1; i <= levels.length; i++) {
    if (i === levels.length || levels[i] !== levels[i - 1] + 1) {
      const run = levels.slice(runStart, i);
      if (run.length >= 3) {
        for (let s = 0; s < run.length; s++) {
          for (let e = s + 3; e <= run.length; e++) {
            candidates.push({ type: 'level_straight', cardIds: run.slice(s, e).map(l => byLevel[l][0]) });
          }
        }
      }
      runStart = i;
    }
  }

  // Rarity rainbow (one of each of 4 rarities)
  const allRarities = ['common', 'uncommon', 'rare', 'epic'];
  if (allRarities.every(r => byRarity[r])) {
    candidates.push({ type: 'rarity_rainbow', cardIds: allRarities.map(r => byRarity[r][0]) });
  }

  // Item type rainbow (one of each of 5 types)
  const allTypes = ['weapon', 'armor', 'consumable', 'trinket', 'luxury'];
  if (allTypes.every(t => byType[t])) {
    candidates.push({ type: 'item_type_rainbow', cardIds: allTypes.map(t => byType[t][0]) });
  }

  // Score and sort descending
  for (const c of candidates) c.points = scoreSet(c.type, c.cardIds);
  candidates.sort((a, b) => b.points - a.points);

  // Greedy assignment — pick highest-scoring non-conflicting sets
  const used = new Set();
  let bonus = 0;
  for (const cand of candidates) {
    if (cand.cardIds.some(id => used.has(id))) continue;
    bonus += cand.points;
    for (const id of cand.cardIds) used.add(id);
  }

  return { base, bonus, total: base + bonus };
}

function calcScore(playerIndex) {
  const player = G.players[playerIndex];
  const sets   = G.allPlayerSets[playerIndex] || [];
  const base   = player.stash.reduce((s, id) => s + CARDS[id].level, 0);
  const bonus  = sets.reduce((s, set) => s + set.points, 0);
  return { base, bonus, total: base + bonus };
}

// ============================================================
// SORTING
// ============================================================
function sortedCards(cardIds) {
  if (!G || G.cardSort.length === 0) return cardIds;
  return [...cardIds].sort((a, b) => {
    for (const key of G.cardSort) {
      const ca = CARDS[a], cb = CARDS[b];
      let diff = 0;
      if (key === 'rarity') diff = RARITY_ORDER[ca.rarity] - RARITY_ORDER[cb.rarity];
      else if (key === 'level') diff = ca.level - cb.level;
      else if (key === 'type')  diff = ca.itemType.localeCompare(cb.itemType);
      if (diff !== 0) return diff;
    }
    return 0;
  });
}

function toggleSort(key) {
  const i = G.cardSort.indexOf(key);
  if (i !== -1) G.cardSort.splice(i, 1);
  else G.cardSort.push(key);
  render();
}

function sortRowHTML() {
  const btn = key => {
    const i = G.cardSort.indexOf(key);
    const badge  = i !== -1 ? ' ' + '①②③'[i] : '';
    const active = i !== -1 ? ' active' : '';
    const label  = key.charAt(0).toUpperCase() + key.slice(1);
    return `<button class="btn-ghost sort-btn${active}" onclick="toggleSort('${key}')">
      ${label}${badge}
    </button>`;
  };
  return `<div class="sort-row">
    <span class="sort-label">SORT:</span>
    ${btn('rarity')}${btn('level')}${btn('type')}
  </div>`;
}

// ============================================================
// RENDER HELPERS
// ============================================================
function cardHTML(id, face, extraClass = '') {
  const c     = CARDS[id];
  const emoji = face === 'monster' ? MONSTER_EMOJI[c.monsterType] : ITEM_EMOJI[c.itemType];
  const type  = face === 'monster' ? c.monsterType : c.itemType;
  const faceClass = face === 'monster' ? ' monster-face' : '';
  return `<div class="card rarity-${c.rarity}${faceClass} ${extraClass}" data-id="${id}">
    <span class="card-level">${c.level}</span>
    <span class="card-emoji">${emoji}</span>
    <span class="card-type">${type}</span>
  </div>`;
}

function scoringReferenceHTML() {
  const S = CONFIG.SCORING;
  const mRows = S.MATCHING_SET_POINTS.slice(2).map((pts, i) => `<strong>${i+2}</strong>:${pts}`).join('  ');
  const sRows = S.STRAIGHT_POINTS.slice(3).map((pts, i) => `<strong>${i+3}</strong>:${pts}`).join('  ');
  return `<div class="win score-ref">
    <h3 style="margin-bottom:10px">SCORING REF</h3>
    <div style="margin-bottom:8px"><strong class="strong">Matching</strong> (same rarity/level/type, min 2) &nbsp; ${mRows}</div>
    <div style="margin-bottom:8px"><strong class="strong">Level Straight</strong> (min 3 consecutive) &nbsp; ${sRows}</div>
    <div>
      <strong class="strong">Rarity Rainbow</strong> (4 cards, one each): <strong>${S.RARITY_RAINBOW}pts</strong>
      &nbsp;&nbsp;
      <strong class="strong">Type Rainbow</strong> (5 cards, one each): <strong>${S.ITEM_TYPE_RAINBOW}pts</strong>
    </div>
  </div>`;
}

// ============================================================
// THEME CONTROLLER
// ============================================================
function setTheme() {
  let theme = 'dungeon';
  if (G.phase === 'stash' || (G.phase === 'interstitial' && G.interstitialNext === 'stash-next')) {
    theme = 'stash';
  } else if (['scoring', 'gameover'].includes(G.phase) ||
             (G.phase === 'interstitial' && G.interstitialNext === 'scoring-next')) {
    theme = 'shop';
  }
  document.body.dataset.theme = theme;
}

// ============================================================
// RENDER FUNCTIONS
// ============================================================
function render() {
  setTheme();
  const app = document.getElementById('app');
  switch (G.phase) {
    case 'wave':         app.innerHTML = renderWave();         break;
    case 'discard':      app.innerHTML = renderDiscard();      break;
    case 'stash':        app.innerHTML = renderStash();        break;
    case 'scoring':      app.innerHTML = renderScoring();      break;
    case 'gameover':     app.innerHTML = renderGameover();     break;
    case 'interstitial': app.innerHTML = renderInterstitial(); break;
  }
}

function renderWave() {
  const player = G.players[G.currentPlayerIndex];
  const waveNum = G.waveIndex + 1;
  const sel = G.selectedCardIds;

  // Combat status
  let combatStatus = '';
  if (sel.length > 0) {
    const items = sel.map(id => CARDS[id]);
    const raritySet = new Set(items.map(c => c.rarity));
    const sum = items.reduce((s, c) => s + c.level, 0);
    if (raritySet.size > 1) {
      combatStatus = `<div class="combat-status combat-warn">✗ Mixed rarities — all cards must share a rarity</div>`;
    } else {
      const r = [...raritySet][0];
      combatStatus = `<div class="combat-status combat-ok">✓ ${sum} power (${RARITY_LABEL[r]}) — click a monster pile to fight</div>`;
    }
  }

  // Arena piles
  let pilesHTML = '';
  G.wavePiles.forEach((pile, pi) => {
    if (pile.length === 0) {
      pilesHTML += `<div class="pile"><div class="pile-empty">✓</div><div class="pile-count">cleared</div></div>`;
      return;
    }
    const topId = pile[pile.length - 1];
    const canFight = sel.length > 0 && canDefeat(sel, topId);
    const stackClass = pile.length === 1 ? '' : pile.length === 2 ? 'depth-2' : 'depth-many';
    pilesHTML += `<div class="pile">
      <div class="pile-stack ${stackClass}">
        ${cardHTML(topId, 'monster')}
      </div>
      <div class="pile-count">${pile.length} deep</div>
      <button class="btn-danger pile-btn" onclick="handleDefeat(${pi})" ${canFight ? '' : 'disabled'}>
        ${canFight ? 'FIGHT ✓' : 'FIGHT'}
      </button>
    </div>`;
  });

  // Hand cards
  const handHTML = sortedCards(player.hand).map(id =>
    cardHTML(id, 'item', sel.includes(id) ? 'selected' : '')
  ).join('') || '<em>No cards in hand</em>';

  // Loot pile
  const lootSection = player.lootPile.length > 0 ? `
    <div class="win">
      <h3>LOOT PILE — embargoed this wave (${player.lootPile.length} cards)</h3>
      <div class="card-row">${player.lootPile.map(id => cardHTML(id, 'item', 'assigned')).join('')}</div>
    </div>` : '';

  // Players overview (multiplayer only)
  const overviewSection = G.players.length > 1 ? `
    <div class="win">
      <h3>PLAYERS</h3>
      <div class="players-overview">
        ${G.players.map(p => `
          <div class="player-pill ${p.id === G.currentPlayerIndex ? 'active' : ''}">
            <div class="pill-name">${p.id === G.currentPlayerIndex ? '▶ ' : ''}${p.name}</div>
            <div class="pill-stats">Hand: ${p.hand.length} · Loot: ${p.lootPile.length} · Stash: ${p.stash.length}</div>
          </div>`).join('')}
      </div>
    </div>` : '';

  return `
    <div class="game-title">⚔ GREEDY SHOPKEEPERS</div>

    <div class="status-bar">
      <span class="sb-wave">WAVE ${waveNum} / ${CONFIG.WAVE_COUNT}</span>
      <span><span class="sb-label">TURN:</span> <span class="sb-val">${player.name}</span></span>
      <span class="sb-label">Draw pile: ${G.drawPile.length}</span>
    </div>

    <div class="win">
      <h2>▸ WAVE ${waveNum} ARENA</h2>
      <div class="wave-arena">${pilesHTML}</div>
    </div>

    <div class="win">
      <h2>▸ ${player.name.toUpperCase()}'S HAND (${player.hand.length})</h2>
      ${sortRowHTML()}
      <div class="card-row">${handHTML}</div>
      ${combatStatus}
      <div class="btn-row">
        <button class="btn-ghost" onclick="handleClearSel()">Clear sel.</button>
        <button class="btn-secondary" onclick="handleForfeit()">Forfeit — draw 1</button>
      </div>
    </div>

    ${lootSection}
    ${overviewSection}`;
}

function renderDiscard() {
  const player = G.players[G.currentPlayerIndex];
  const excess = player.hand.length - CONFIG.HAND_MAX_START;
  const handHTML = sortedCards(player.hand).map(id => cardHTML(id, 'item')).join('');
  return `
    <div class="game-title">⚔ GREEDY SHOPKEEPERS</div>

    <div class="status-bar">
      <span class="sb-wave">WAVE ${G.waveIndex + 1} / ${CONFIG.WAVE_COUNT}</span>
      <span><span class="sb-label">PLAYER:</span> <span class="sb-val">${player.name}</span></span>
    </div>

    <div class="win">
      <h2>▸ DISCARD DOWN TO ${CONFIG.HAND_MAX_START}</h2>
      <div class="combat-status combat-warn" style="margin-bottom:14px">
        You have ${player.hand.length} cards — discard ${excess} more to begin your turn. Click a card to discard it.
      </div>
      ${sortRowHTML()}
      <div class="card-row">${handHTML}</div>
    </div>`;
}

function renderStash() {
  const player   = G.players[G.stashPlayerIndex];
  const sel      = G.stashSelectedIds;
  const levelSum = sel.reduce((s, id) => s + CARDS[id].level, 0);
  const qualOk   = sel.length >= 1 && sel.length <= CONFIG.STASH_QUALITY_MAX;
  const qtyOk    = sel.length > 0 && levelSum <= CONFIG.STASH_QUANTITY_MAX;

  const lootHTML = sortedCards(player.lootPile).map(id =>
    cardHTML(id, 'item', sel.includes(id) ? 'selected' : '')
  ).join('') || '<em>Loot pile is empty</em>';

  const selInfo = sel.length > 0
    ? `Selected: ${sel.length} card${sel.length > 1 ? 's' : ''} — level sum <span class="gold">${levelSum}</span>`
    : '<span class="dim">Click cards to select them</span>';

  const currentStashSection = player.stash.length > 0 ? `
    <div class="win">
      <h3>${player.name.toUpperCase()}'S STASH (${player.stash.length} cards)</h3>
      <div class="card-row">${player.stash.map(id => cardHTML(id, 'item', 'assigned')).join('')}</div>
    </div>` : '';

  return `
    <div class="game-title">◆ STASH PHASE</div>

    <div class="status-bar">
      <span class="sb-wave">WAVE ${G.waveIndex + 1} COMPLETE</span>
      <span><span class="sb-label">STASHING:</span> <span class="sb-val">${player.name}</span></span>
    </div>

    <div class="win">
      <h2>▸ ${player.name.toUpperCase()}'S LOOT PILE (${player.lootPile.length} cards)</h2>
      <div class="stash-hint">
        <strong>QUALITY STASH</strong> — pick 1–${CONFIG.STASH_QUALITY_MAX} cards of any level.
        &nbsp;&nbsp;
        <strong>QUANTITY STASH</strong> — pick any number of cards whose combined level ≤ ${CONFIG.STASH_QUANTITY_MAX}.
        <br>Remaining loot returns to your hand.
      </div>
      ${sortRowHTML()}
      <div class="card-row">${lootHTML}</div>
      <div style="margin-top:10px;font-size:8px">${selInfo}</div>
      <div class="btn-row">
        <button class="btn-success" onclick="handleStash('quality')" ${qualOk ? '' : 'disabled'}>
          Quality Stash${qualOk ? ' (' + sel.length + ')' : ''} ✓
        </button>
        <button class="btn-primary" onclick="handleStash('quantity')" ${qtyOk ? '' : 'disabled'}>
          Quantity Stash${qtyOk ? ' (sum=' + levelSum + ')' : levelSum > CONFIG.STASH_QUANTITY_MAX ? ' ✗ too high' : ''}
        </button>
        <button class="btn-ghost" onclick="handleClearStashSel()">Clear</button>
      </div>
    </div>

    ${currentStashSection}`;
}

function renderScoring() {
  const player   = G.players[G.scoringPlayerIndex];
  const sel      = G.scoringSelected;
  const asgn     = G.scoringAssigned;
  const baseScore = player.stash.reduce((s, id) => s + CARDS[id].level, 0);
  const setScore  = G.scoringSets.reduce((s, set) => s + set.points, 0);
  const total     = baseScore + setScore;

  const stashHTML = player.stash.length > 0
    ? sortedCards(player.stash).map(id =>
        asgn[id]
          ? cardHTML(id, 'item', 'assigned')
          : cardHTML(id, 'item', sel.includes(id) ? 'selected' : '')
      ).join('')
    : '<em>No stashed cards</em>';

  const eligible = sel.filter(id => !asgn[id]);

  const setButtons = SET_TYPES.map(st => {
    const valid = validateSet(st.key, eligible);
    const pts   = valid ? scoreSet(st.key, eligible) : 0;
    return `<button class="btn-secondary set-type-btn" onclick="handleAssignSet('${st.key}')" ${valid ? '' : 'disabled'}>
      <span class="set-name">${st.label}${valid ? ' +' + pts + 'pts' : ''}</span>
      <span class="set-desc">${st.desc}</span>
    </button>`;
  }).join('');

  const committedHTML = G.scoringSets.map((s, i) => {
    const label = SET_TYPES.find(st => st.key === s.type)?.label || s.type;
    const cards = s.cardIds.map(id => cardHTML(id, 'item', 'assigned')).join('');
    return `<div class="set-bucket valid">
      <h4>${label} — <span class="gold">+${s.points} pts</span>
        <button onclick="handleRemoveSet(${i})" style="font-size:6px;padding:3px 8px;margin-left:10px;" class="btn-danger">REMOVE</button>
      </h4>
      <div class="card-row">${cards}</div>
    </div>`;
  }).join('');

  const setSection = eligible.length > 0 ? `
    <div class="win">
      <h2>▸ ASSIGN TO SET</h2>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">${setButtons}</div>
    </div>` : '';

  const committedSection = G.scoringSets.length > 0 ? `
    <div class="win">
      <h2>▸ COMMITTED SETS</h2>
      ${committedHTML}
    </div>` : '';

  return `
    <div class="game-title">🏪 FINAL SCORING</div>

    <div class="status-bar">
      <span class="sb-wave">SCORING PHASE</span>
      <span><span class="sb-label">PLAYER:</span> <span class="sb-val">${player.name}</span></span>
      <span><span class="sb-label">Running total:</span> <span class="gold" style="font-size:11px">${total} pts</span></span>
    </div>

    <div class="win">
      <h2>▸ ${player.name.toUpperCase()}'S STASH (${player.stash.length} cards)</h2>
      <div class="win-alt" style="font-size:7px;color:var(--text-muted);margin-bottom:12px;padding:8px 12px">
        All stash cards count toward base score. Select cards, then assign to a set for bonus points. Dimmed cards are already assigned.
      </div>
      ${sortRowHTML()}
      <div class="card-row">${stashHTML}</div>
      <div class="btn-row">
        <button class="btn-ghost" onclick="handleClearScoringSel()">Clear sel.</button>
      </div>
    </div>

    ${setSection}
    ${committedSection}
    ${scoringReferenceHTML()}

    <div class="win">
      <div class="score-summary">
        <span>Base: <strong>${baseScore}</strong></span>
        <span class="dim">+</span>
        <span>Sets: <strong>${setScore}</strong></span>
        <span class="dim">=</span>
        <span class="big">${total}</span>
        <span class="dim">pts</span>
      </div>
      <div class="btn-row" style="margin-top:16px">
        <button class="btn-success" onclick="handleLockIn()" style="font-size:9px;padding:12px 24px">
          LOCK IN — ${total} pts ✓
        </button>
      </div>
    </div>`;
}

function renderGameover() {
  const scores = G.players.map((p, i) => {
    const actual = calcScore(i);
    const best   = calcBestScore(i);
    const eff    = best.total > 0 ? Math.round(actual.total / best.total * 100) : 100;
    return { name: p.name, ...actual, best, eff };
  }).sort((a, b) => b.total - a.total);

  const maxScore = scores[0].total;
  const winners  = scores.filter(s => s.total === maxScore).map(s => s.name).join(' & ');

  const rows = scores.map(s => `
    <div class="score-entry ${s.total === maxScore ? 'winner' : ''}">
      <span>${s.total === maxScore ? '🏆 ' : ''}${s.name}</span>
      <div style="text-align:right">
        <div class="score-total">${s.total}</div>
        <div class="score-breakdown">base ${s.base} + sets ${s.bonus}</div>
        <div style="font-size:7px;color:var(--text-muted);margin-top:4px">
          best possible ≈${s.best.total} pts &nbsp;·&nbsp; efficiency ${s.eff}%
        </div>
      </div>
    </div>`).join('');

  const headline = G.players.length === 1
    ? `Final score: <span class="gold">${maxScore} pts</span>`
    : `Winner${scores.filter(s => s.total === maxScore).length > 1 ? 's' : ''}: <span class="gold">${winners}</span>`;

  return `
    <div class="game-title">🏆 GAME OVER</div>
    <div class="win">
      <h2 style="text-align:center;font-size:12px;color:var(--gold);margin-bottom:18px">FINAL SCORES</h2>
      ${rows}
      <div style="text-align:center;margin-top:20px;font-size:10px">${headline}</div>
      <div style="text-align:center;margin-top:8px;font-size:7px;color:var(--text-muted)">
        best possible is an approximate upper bound (greedy heuristic)
      </div>
    </div>
    <div style="text-align:center;margin-top:16px">
      <button class="btn-primary" onclick="showSetup()" style="font-size:10px;padding:14px 36px">PLAY AGAIN</button>
    </div>`;
}

function renderInterstitial() {
  let phase, title, sub, btnLabel, btnAction;

  if (G.interstitialNext === 'wave-turn') {
    const next = G.players[(G.currentPlayerIndex + 1) % G.players.length];
    phase    = `WAVE ${G.waveIndex + 1}`;
    title    = `PASS TO ${next.name.toUpperCase()}`;
    sub      = 'Hand this device to the next player.';
    btnLabel = `I'M ${next.name.toUpperCase()} — START TURN`;
    btnAction = 'handleNextTurn()';

  } else if (G.interstitialNext === 'stash-next') {
    const next = G.players[G.stashPlayerIndex];
    phase    = `STASH PHASE`;
    title    = `PASS TO ${next.name.toUpperCase()}`;
    sub      = 'Hand this device to the next player.';
    btnLabel = `I'M ${next.name.toUpperCase()} — START STASHING`;
    btnAction = 'handleNextStash()';

  } else if (G.interstitialNext === 'scoring-next') {
    const next = G.players[G.scoringPlayerIndex];
    phase    = `FINAL SCORING`;
    title    = `PASS TO ${next.name.toUpperCase()}`;
    sub      = 'Hand this device to the next player.';
    btnLabel = `I'M ${next.name.toUpperCase()} — BUILD MY SETS`;
    btnAction = 'handleNextScoring()';
  }

  return `
    <div class="interstitial">
      <div class="inter-phase">${phase}</div>
      <h2>${title}</h2>
      <p class="inter-sub">${sub}</p>
      <button class="btn-primary" onclick="${btnAction}" style="font-size:8px;padding:14px 24px">${btnLabel}</button>
    </div>`;
}

// ============================================================
// SETUP SCREEN
// ============================================================
function showSetup() {
  document.body.dataset.theme = 'dungeon';
  document.getElementById('app').innerHTML = `
    <div class="setup-screen">
      <div class="setup-banner">
        <div class="setup-banner-text">
          <div class="banner-title">GREEDY SHOPKEEPERS</div>
          <div class="banner-sub">Defeat monsters · Loot items · Build the best shop</div>
        </div>
      </div>

      <p class="setup-prompt">How many players?</p>
      <div class="player-count-row">
        <button class="btn-primary player-count-btn" onclick="initGame(1)">1</button>
        <button class="btn-primary player-count-btn" onclick="initGame(2)">2</button>
        <button class="btn-primary player-count-btn" onclick="initGame(3)">3</button>
        <button class="btn-primary player-count-btn" onclick="initGame(4)">4</button>
      </div>
      <p style="font-size:7px;color:var(--text-muted)">Start with 1 player to learn the rules</p>
    </div>`;
}

// ============================================================
// EVENT DELEGATION — card clicks
// ============================================================
document.getElementById('app').addEventListener('click', e => {
  const card = e.target.closest('.card');
  if (!card) return;
  const id = card.dataset.id;
  if (!id || !G) return;

  if (G.phase === 'discard') {
    handleDiscardCard(id);

  } else if (G.phase === 'wave') {
    const player = G.players[G.currentPlayerIndex];
    if (!player.hand.includes(id)) return; // only hand cards are selectable
    const i = G.selectedCardIds.indexOf(id);
    if (i !== -1) G.selectedCardIds.splice(i, 1);
    else G.selectedCardIds.push(id);
    render();

  } else if (G.phase === 'stash') {
    const player = G.players[G.stashPlayerIndex];
    if (!player.lootPile.includes(id)) return;
    const i = G.stashSelectedIds.indexOf(id);
    if (i !== -1) G.stashSelectedIds.splice(i, 1);
    else G.stashSelectedIds.push(id);
    render();

  } else if (G.phase === 'scoring') {
    const player = G.players[G.scoringPlayerIndex];
    if (!player.stash.includes(id)) return;
    if (G.scoringAssigned[id]) return;
    const i = G.scoringSelected.indexOf(id);
    if (i !== -1) G.scoringSelected.splice(i, 1);
    else G.scoringSelected.push(id);
    render();
  }
});

// ============================================================
// ACTION HANDLERS (called from onclick attributes)
// ============================================================
function handleDefeat(pileIndex) {
  if (!G || G.phase !== 'wave') return;
  const pile = G.wavePiles[pileIndex];
  if (!pile || !pile.length) return;
  if (!canDefeat(G.selectedCardIds, pile[pile.length - 1])) return;
  defeatMonster(pileIndex);
  render();
}

function handleForfeit() {
  if (!G || G.phase !== 'wave') return;
  forfeit();
  render();
}

function handleClearSel() {
  if (!G) return;
  G.selectedCardIds = [];
  render();
}

function handleStash(type) {
  if (!G || G.phase !== 'stash') return;
  confirmStash(type);
  render();
}

function handleClearStashSel() {
  if (!G) return;
  G.stashSelectedIds = [];
  render();
}

function handleAssignSet(type) {
  if (!G || G.phase !== 'scoring') return;
  assignSet(type);
  render();
}

function handleRemoveSet(index) {
  if (!G || G.phase !== 'scoring') return;
  removeSet(index);
  render();
}

function handleClearScoringSel() {
  if (!G) return;
  G.scoringSelected = [];
  render();
}

function handleLockIn() {
  if (!G || G.phase !== 'scoring') return;
  lockInScore();
  render();
}

function handleNextTurn() {
  if (!G) return;
  G.currentPlayerIndex = (G.currentPlayerIndex + 1) % G.players.length;
  G.interstitialNext = null;
  enterWavePhase();
  render();
}

function handleNextStash() {
  if (!G) return;
  G.phase = 'stash';
  G.interstitialNext = null;
  render();
}

function handleNextScoring() {
  if (!G) return;
  G.phase = 'scoring';
  G.interstitialNext = null;
  render();
}

// ============================================================
// BOOT
// ============================================================
showSetup();
</script>
</body>
</html>
